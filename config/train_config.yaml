linear:
  MLP:
    model_name: MLP
    lr: 0.005
    n_epochs: 50
    hidden_size: 128
    weight_decay: 0.005

  DecisionTree:
    model_name: DecisionTree
    max_depth: 5

    min_samples_split: 10

    min_samples_leaf: 2

    criterion: gini

  RandomForest:
    model_name: RandomForest
    n_estimators: 500

    max_depth: null

    min_samples_split: 10

    min_samples_leaf: 1

    max_features: sqrt

  Logreg:
    model_name: Logreg
    C: 5.0

    penalty: l2

    solver: saga

    max_iter: 1000

graph:
  GCN:
    model_name: GCN
    hidden_size: 256
    lr: 0.001
    n_epochs: 20
    embed_dim: 16

  GAT:
    model_name: GAT
    hidden_size: 512
    lr: 0.005
    n_epochs: 20
    embed_dim: 32

sequential:
  BiLSTM:
    model_name: BiLSTM
    input_size: 60
    hidden_size: 32
    num_classes: 6
    num_layers: 2
    lr: 0.001
    n_epochs: 10

  MHAttention:
    model_name: MHAttention
    input_size: 60
    hidden_size: 32
    num_classes: 6
    n_epochs: 10
    lr: 0.001

mixed:
  BiLSTM_GAT_FC:
    model_name: BiLSTM_GAT_FC
    input_size: 60
    lstm_hidden_size: 32
    lstm_layers: 2
    gat_hidden_size: 4
    gat_heads: 4
    num_classes: 6
    n_epochs: 1
    lr: 0.001

  MHAttention_GAT:
    model_name: MHAttention_GAT
    input_size: 60
    attn_hidden_size: 32
    gat_hidden_size: 32
    gat_heads: 4
    num_heads: 4
    num_classes: 6
    dropout: 0.1
    lr: 0.001
    n_epochs: 1
